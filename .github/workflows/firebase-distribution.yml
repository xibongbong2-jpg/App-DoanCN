name: Tự động Build và Phân phối App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code từ GitHub
        uses: actions/checkout@v3

      - name: Thiết lập Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Tạo file google-services.json từ GitHub Secret
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Cấp quyền cho file Gradle
        run: chmod +x gradlew

      - name: Build file APK (Bản Debug)
        run: ./gradlew assembleDebug

      - name: Đẩy APK lên Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "testers"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}